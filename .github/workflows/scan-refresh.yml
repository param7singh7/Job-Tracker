name: Scan Refresh

on:
  schedule:
    - cron: "15 */6 * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render refresh endpoint
        env:
          APP_URL: ${{ secrets.RENDER_APP_URL }}
        run: |
          if [ -z "$APP_URL" ]; then
            echo "Missing repository secret: RENDER_APP_URL"
            exit 1
          fi

          TARGET="${APP_URL%/}/api/refresh"
          echo "Triggering: $TARGET"
          curl -fsS -X POST "$TARGET" --max-time 1200
          echo "Refresh completed"
