services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: job_radar
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/job_radar?schema=public
    depends_on:
      - db

volumes:
  pg_data:
